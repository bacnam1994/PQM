<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#009639">
    <title>V-Biotech | Quality Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #fcfdfc; 
            color: #1e293b; 
            -webkit-font-smoothing: antialiased;
        }
        #app-loader {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999;
        }
        .loader-spinner {
            width: 40px; height: 40px; border: 4px solid #f1f5f9;
            border-top: 4px solid #009639; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="app-loader">
        <div class="loader-spinner"></div>
        <p style="margin-top: 16px; font-weight: 700; font-size: 11px; color: #009639; text-transform: uppercase; letter-spacing: 1px;">V-Biotech Systems</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
